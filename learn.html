<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>授業で学ぶ医学英語</title>
  <link rel="stylesheet" href="css/common.css" />
  <style>
/* ===== learn.html 専用スタイル ===== */

/* --- レイアウト --- */
body { background: var(--cream); }

.learn-container {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

/* --- サイドバー（目次） --- */
.sidebar {
  grid-row: 2;
  background: var(--navy);
  color: rgba(255,255,255,.85);
  padding: 16px 0;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}

.sidebar-title {
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,.45);
  padding: 0 18px 10px;
  border-bottom: 1px solid rgba(255,255,255,.1);
  margin-bottom: 8px;
}

.chapter-group { margin-bottom: 4px; }

.chapter-btn {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 10px 18px;
  font-family: inherit;
  font-size: 13px;
  color: rgba(255,255,255,.75);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background .15s;
  border-radius: 0;
}

.chapter-btn:hover { background: rgba(255,255,255,.08); }
.chapter-btn.active { background: var(--teal); color: #fff; }

.chapter-btn .ch-icon { font-size: 1.1em; flex-shrink: 0; }
.chapter-btn .ch-num {
  font-size: 10px;
  background: rgba(255,255,255,.18);
  border-radius: 8px;
  padding: 0 6px;
  margin-left: auto;
}
.chapter-btn.active .ch-num { background: rgba(255,255,255,.28); }
.chapter-btn.done .ch-icon::after { content: ' ✓'; font-size: .8em; color: #6ee9cb; }

/* --- メインコンテンツ --- */
.learn-main {
  grid-row: 2;
  padding: 28px 32px 60px;
  max-width: 860px;
}

/* --- 進捗バー --- */
.progress-header {
  grid-column: 1 / 3;
  background: white;
  border-bottom: 1px solid var(--gray-3);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}

.progress-label { font-size: 13px; color: var(--gray-2); white-space: nowrap; }

.progress-track {
  flex: 1;
  height: 6px;
  background: var(--gray-3);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--amber));
  border-radius: 3px;
  transition: width .4s ease;
}

.progress-pct { font-size: 13px; font-weight: bold; color: var(--navy); white-space: nowrap; }

/* --- バッジエリア --- */
.badge-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-left: auto;
}

.badge {
  font-size: 18px;
  opacity: .25;
  transition: opacity .3s, transform .3s;
  cursor: default;
  title: attr(data-label);
}
.badge.earned { opacity: 1; transform: scale(1.1); }

/* --- スライドカード --- */
.slide-card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 3px 14px rgba(0,0,0,.09);
  overflow: hidden;
  margin-bottom: 24px;
  display: none;
  animation: fadeIn .3s ease;
}
.slide-card.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* スライド番号 */
.slide-eyebrow {
  background: var(--navy);
  color: rgba(255,255,255,.7);
  font-size: 11px;
  letter-spacing: .1em;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
}

.slide-body { padding: 24px 28px 20px; }

.slide-title {
  font-size: 1.3rem;
  font-weight: bold;
  color: var(--navy);
  margin: 0 0 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.slide-title .icon { font-size: 1.5rem; }

.slide-content { line-height: 1.85; color: var(--gray-1); }

.slide-content p { margin: 0 0 14px; }

.slide-content .highlight-box {
  background: #eef6f4;
  border-left: 4px solid var(--teal);
  border-radius: 4px;
  padding: 12px 16px;
  margin: 14px 0;
}

.slide-content .warn-box {
  background: #fff8ee;
  border-left: 4px solid var(--amber);
  border-radius: 4px;
  padding: 12px 16px;
  margin: 14px 0;
}

.slide-content .term-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 13px;
}

.slide-content .term-table th {
  background: var(--navy);
  color: white;
  padding: 8px 12px;
  text-align: left;
}

.slide-content .term-table td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--gray-3);
  vertical-align: top;
}

.slide-content .term-table tr:nth-child(even) td { background: #f5f8fc; }

.en-term {
  font-style: italic;
  color: var(--navy);
  font-weight: 600;
}

.jp-reading { color: var(--gray-2); font-size: .9em; }

.keyword {
  background: #fff3cd;
  padding: 1px 4px;
  border-radius: 3px;
  font-weight: 600;
}

/* スライドナビ */
.slide-nav {
  padding: 14px 20px;
  border-top: 1px solid var(--gray-3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.slide-counter { font-size: 13px; color: var(--gray-2); }

/* --- クイズ --- */
.quiz-card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 3px 14px rgba(0,0,0,.09);
  overflow: hidden;
  margin-bottom: 24px;
  display: none;
  animation: fadeIn .3s ease;
}
.quiz-card.active { display: block; }

.quiz-header {
  background: linear-gradient(90deg, var(--teal), #1a6b5e);
  color: white;
  padding: 14px 20px;
  font-weight: bold;
  font-size: 1.05rem;
}

.quiz-body { padding: 20px 24px; }

.quiz-q { font-size: 1.05rem; color: var(--navy); font-weight: bold; margin-bottom: 16px; }

.quiz-options { display: flex; flex-direction: column; gap: 10px; }

.quiz-option {
  border: 2px solid var(--gray-3);
  border-radius: 8px;
  padding: 12px 16px;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  text-align: left;
  background: var(--white);
  transition: border-color .15s, background .15s;
  color: var(--gray-1);
}

.quiz-option:hover:not(:disabled) {
  border-color: var(--teal);
  background: #f0f9f7;
}

.quiz-option.correct {
  border-color: var(--teal);
  background: #e6f5f2;
  color: #0a5c4e;
  font-weight: bold;
}

.quiz-option.wrong {
  border-color: #e74c3c;
  background: #fdf0ef;
  color: #a93226;
}

.quiz-option:disabled { cursor: default; }

.quiz-feedback {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  display: none;
}

.quiz-feedback.show { display: block; }
.quiz-feedback.ok { background: #e6f5f2; color: #0a5c4e; border-left: 4px solid var(--teal); }
.quiz-feedback.ng { background: #fdf0ef; color: #a93226; border-left: 4px solid #e74c3c; }

.quiz-next-btn { margin-top: 14px; display: none; }
.quiz-next-btn.show { display: block; }

/* --- チャプター完了画面 --- */
.chapter-complete {
  text-align: center;
  padding: 40px 20px;
  display: none;
}
.chapter-complete.active { display: block; }
.chapter-complete .big-badge { font-size: 5rem; margin-bottom: 12px; }
.chapter-complete h2 { color: var(--navy); margin-bottom: 8px; }
.chapter-complete p { color: var(--gray-2); margin-bottom: 20px; }

/* --- 難易度選択 --- */
.diff-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.diff-btn {
  padding: 6px 16px;
  border-radius: 16px;
  border: 2px solid var(--gray-3);
  background: white;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  color: var(--gray-1);
}

.diff-btn.active { border-color: var(--teal); background: var(--teal); color: white; font-weight: bold; }

/* モバイル対応 */
@media (max-width: 720px) {
  .learn-container {
    grid-template-columns: 1fr;
  }
  .sidebar {
    position: static;
    height: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    padding: 8px 0;
  }
  .chapter-btn { width: auto; flex: 1; min-width: 120px; }
  .learn-main { padding: 16px 14px 40px; }
  .progress-header { padding: 0 12px; }
}
  </style>
</head>

let state = {
  currentChapter: 0,
  currentSlide: 0,
  inQuiz: false,
  quizIndex: 0,
  quizAnswered: false,
  completedChapters: new Set(),
  totalSlides: 0,
  completedSlides: 0
};

// 総スライド数計算
function calcTotals() {
  state.totalSlides = CHAPTERS.reduce((sum, ch) => sum + ch.slides.length + ch.quizzes.length, 0);
}

// ============================================================
// UI構築
// ============================================================
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = CHAPTERS.map((ch, i) => `
    <div class="chapter-group">
      <button class="chapter-btn ${i === 0 ? 'active' : ''}" 
              onclick="goChapter(${i})" id="sidebar-ch-${i}">
        <span class="ch-icon">${ch.icon}</span>
        <span style="flex:1; line-height:1.3;">${ch.title}</span>
        <span class="ch-num" id="ch-num-${i}">Ch.${i+1}</span>
      </button>
    </div>
  `).join('');
}

function renderSlide() {
  const ch = CHAPTERS[state.currentChapter];
  const area = document.getElementById('slideArea');
  const totalInChap = ch.slides.length;
  const quizLen = ch.quizzes.length;
  const isQuizPhase = state.inQuiz;
  const isComplete = state.currentSlide >= totalInChap + quizLen;

  if (isComplete) {
    renderComplete(ch);
    return;
  }

  if (!isQuizPhase) {
    renderSlideContent(ch);
  } else {
    renderQuiz(ch);
  }
  updateProgress();
}

function renderSlideContent(ch) {
  const slide = ch.slides[state.currentSlide];
  const total = ch.slides.length;
  const isLast = state.currentSlide === total - 1;

  document.getElementById('slideArea').innerHTML = `
    <div class="slide-card active" id="mainCard">
      <div class="slide-eyebrow">
        <span>${ch.icon} ${ch.title}</span>
        <span>スライド ${state.currentSlide + 1} / ${total}</span>
      </div>
      <div class="slide-body">
        <h2 class="slide-title"><span class="icon">${slide.icon}</span>${slide.title}</h2>
        <div class="slide-content">${slide.content}</div>
      </div>
      <div class="slide-nav">
        <button class="btn btn-ghost btn-sm" onclick="prevSlide()" ${state.currentSlide === 0 ? 'disabled' : ''}>← 前へ</button>
        <span class="slide-counter">Ch.${state.currentChapter+1} — ${state.currentSlide+1}/${total}</span>
        <button class="btn ${isLast ? 'btn-amber' : 'btn-accent'} btn-sm" onclick="nextSlide()">
          ${isLast ? 'クイズへ ✏️' : '次へ →'}
        </button>
      </div>
    </div>`;
}

function renderQuiz(ch) {
  const qi = state.quizIndex;
  const quiz = ch.quizzes[qi];
  const total = ch.quizzes.length;

  document.getElementById('slideArea').innerHTML = `
    <div class="quiz-card active">
      <div class="quiz-header">✏️ 確認クイズ ${qi+1} / ${total} — ${ch.title}</div>
      <div class="quiz-body">
        <div class="quiz-q">Q. ${quiz.q}</div>
        <div class="quiz-options">
          ${quiz.options.map((opt, i) => `
            <button class="quiz-option" id="opt-${i}" onclick="answerQuiz(${i})">
              ${String.fromCharCode(65+i)}. ${opt}
            </button>`).join('')}
        </div>
        <div class="quiz-feedback" id="quizFeedback"></div>
        <div class="quiz-next-btn" id="quizNext">
          <button class="btn btn-accent" onclick="nextQuiz()">
            ${qi < total - 1 ? '次の問題 →' : 'チャプター完了 🎉'}
          </button>
        </div>
      </div>
    </div>`;
}

function renderComplete(ch) {
  document.getElementById('slideArea').innerHTML = `
    <div class="chapter-complete active card">
      <div class="big-badge">${ch.icon}</div>
      <h2>「${ch.title}」完了！</h2>
      <p>バッジ <strong>${ch.badge}</strong> を獲得しました 🎉</p>
      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        ${state.currentChapter < CHAPTERS.length - 1 ? `
          <button class="btn btn-accent" onclick="goChapter(${state.currentChapter + 1})">
            次のチャプターへ →
          </button>` : `
          <div class="highlight-box" style="max-width:400px; margin:0 auto;">
            <strong>🏆 全チャプター完了！</strong><br>
            すべてのバッジを獲得しました。辞書ツールもぜひ活用してください。
          </div>`}
        <button class="btn btn-ghost" onclick="goChapter(${state.currentChapter})">
          もう一度このチャプターを学ぶ
        </button>
        <a href="index.html" class="btn btn-primary">ポータルへ戻る</a>
      </div>
    </div>`;
}

// ============================================================
// ナビゲーション
// ============================================================
function goChapter(idx) {
  state.currentChapter = idx;
  state.currentSlide = 0;
  state.inQuiz = false;
  state.quizIndex = 0;
  state.quizAnswered = false;

  // サイドバーハイライト
  document.querySelectorAll('.chapter-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });

  renderSlide();
  window.scrollTo({ top: 60, behavior: 'smooth' });
}

function nextSlide() {
  const ch = CHAPTERS[state.currentChapter];
  state.completedSlides++;
  if (state.currentSlide < ch.slides.length - 1) {
    state.currentSlide++;
    renderSlide();
  } else {
    // クイズへ
    state.inQuiz = true;
    state.quizIndex = 0;
    renderSlide();
  }
}

function prevSlide() {
  if (state.currentSlide > 0) {
    state.currentSlide--;
    renderSlide();
  }
}

function answerQuiz(selected) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;

  const ch = CHAPTERS[state.currentChapter];
  const quiz = ch.quizzes[state.quizIndex];
  const correct = selected === quiz.answer;

  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === quiz.answer) btn.classList.add('correct');
    else if (i === selected && !correct) btn.classList.add('wrong');
  });

  const fb = document.getElementById('quizFeedback');
  fb.textContent = (correct ? '✅ 正解！ ' : '❌ 不正解。正解は ' + String.fromCharCode(65 + quiz.answer) + ' です。\n') + quiz.explanation;
  fb.className = 'quiz-feedback show ' + (correct ? 'ok' : 'ng');

  document.getElementById('quizNext').classList.add('show');
  state.completedSlides++;
  updateProgress();
}

function nextQuiz() {
  const ch = CHAPTERS[state.currentChapter];
  state.quizAnswered = false;

  if (state.quizIndex < ch.quizzes.length - 1) {
    state.quizIndex++;
    renderSlide();
  } else {
    // チャプター完了
    state.completedChapters.add(state.currentChapter);
    earnBadge(ch.id);
    const sideBtn = document.getElementById(`sidebar-ch-${state.currentChapter}`);
    if (sideBtn) sideBtn.classList.add('done');
    state.inQuiz = false;
    state.currentSlide = ch.slides.length + ch.quizzes.length; // complete state
    renderSlide();
    updateProgress();
  }
}

// ============================================================
// バッジ・進捗
// ============================================================
function earnBadge(chId) {
  const badge = document.querySelector(`.badge[data-badge="${chId}"]`);
  if (badge) badge.classList.add('earned');
}

function updateProgress() {
  const total = state.totalSlides;
  const done = state.completedSlides;
  const pct = Math.min(100, Math.round((done / total) * 100));

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = `学習進捗 ${done}/${total}`;
}

// ============================================================
// 初期化
// ============================================================
calcTotals();
buildSidebar();
renderSlide();
</script>
</body>
</html>
