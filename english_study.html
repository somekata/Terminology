<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医学英語の勉強 — 大阪公立大学 医学研究推進コース</title>
  <link rel="stylesheet" href="css/common.css" />
  <style>
/* ===== english_study.html 専用スタイル ===== */
body { background: var(--cream); }

/* --- レイアウト --- */
.learn-container {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* --- 進捗ヘッダー --- */
.progress-header {
  grid-column: 1 / 3;
  background: white;
  border-bottom: 1px solid var(--gray-3);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
}

.progress-label { font-size: 12px; color: var(--gray-2); white-space: nowrap; }
.progress-track { flex:1; height:6px; background:var(--gray-3); border-radius:3px; overflow:hidden; }
.progress-fill  { height:100%; background:linear-gradient(90deg, var(--teal), var(--amber)); border-radius:3px; transition:width .4s; }
.progress-pct   { font-size:13px; font-weight:bold; color:var(--navy); white-space:nowrap; }

.badge-row { display:flex; gap:6px; margin-left:auto; }
.badge { font-size:17px; opacity:.2; transition:opacity .3s, transform .3s; cursor:default; }
.badge.earned { opacity:1; transform:scale(1.12); }

/* --- サイドバー --- */
.sidebar {
  background: var(--navy);
  color: rgba(255,255,255,.85);
  padding: 14px 0;
  position: sticky;
  top: 58px;
  height: calc(100vh - 58px);
  overflow-y: auto;
}

.sidebar-title {
  font-size: 10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
  padding: 0 16px 10px;
  border-bottom:1px solid rgba(255,255,255,.1);
  margin-bottom:6px;
}

.chapter-btn {
  width:100%; text-align:left; background:none; border:none;
  padding: 9px 16px; font-family:inherit; font-size:12.5px;
  color:rgba(255,255,255,.72); cursor:pointer;
  display:flex; align-items:center; gap:9px;
  transition:background .15s;
}
.chapter-btn:hover { background:rgba(255,255,255,.08); }
.chapter-btn.active { background:var(--teal); color:#fff; }
.chapter-btn.done   { color:rgba(255,255,255,.55); }
.chapter-btn.done .ch-check { color:#6ee9cb; }

.ch-icon { font-size:1.1em; flex-shrink:0; }
.ch-label { flex:1; line-height:1.3; }
.ch-check { font-size:.85em; margin-left:auto; }

/* --- メインエリア --- */
.learn-main { padding:24px 28px 64px; max-width:900px; }

/* --- スライドカード --- */
.slide-card {
  background:white; border-radius:12px;
  box-shadow:0 3px 14px rgba(0,0,0,.09);
  overflow:hidden; margin-bottom:22px;
  display:none; animation:fadeIn .28s ease;
}
.slide-card.active { display:block; }

@keyframes fadeIn { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }

.slide-eyebrow {
  background:var(--navy); color:rgba(255,255,255,.72);
  font-size:11px; padding:7px 18px;
  display:flex; justify-content:space-between;
}

.slide-body { padding:22px 26px 18px; }

.slide-title {
  font-size:1.25rem; font-weight:bold; color:var(--navy);
  margin:0 0 16px; display:flex; align-items:center; gap:10px;
}
.slide-title .icon { font-size:1.4rem; }
.slide-content { line-height:1.9; color:var(--gray-1); }
.slide-content p { margin:0 0 13px; }

/* ハイライトボックス */
.hl { background:#eef6f4; border-left:4px solid var(--teal); border-radius:4px; padding:12px 16px; margin:12px 0; }
.wn { background:#fff8ee; border-left:4px solid var(--amber); border-radius:4px; padding:12px 16px; margin:12px 0; }
.en-section { background:#f5f8fc; border:1px solid var(--gray-3); border-radius:6px; padding:14px 18px; margin:12px 0; }
.en-section .en-label { font-size:10px; letter-spacing:.1em; color:var(--teal); font-weight:bold; text-transform:uppercase; margin-bottom:6px; }
.en-text { color:#2c3e50; font-style:italic; line-height:1.8; }
.jp-text { color:var(--gray-1); margin-top:8px; padding-top:8px; border-top:1px solid var(--gray-3); font-size:.95em; line-height:1.8; }

/* 表 */
.term-table { width:100%; border-collapse:collapse; margin:12px 0; font-size:13px; }
.term-table th { background:var(--navy); color:white; padding:8px 12px; text-align:left; }
.term-table td { padding:7px 12px; border-bottom:1px solid var(--gray-3); vertical-align:top; }
.term-table tr:nth-child(even) td { background:#f5f8fc; }

.en-term { font-style:italic; color:var(--navy); font-weight:600; }
.keyword { background:#fff3cd; padding:1px 4px; border-radius:3px; font-weight:600; }

/* スライドナビ */
.slide-nav {
  padding:13px 18px; border-top:1px solid var(--gray-3);
  display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
}
.slide-counter { font-size:12px; color:var(--gray-2); }

/* --- クイズ --- */
.quiz-card {
  background:white; border-radius:12px;
  box-shadow:0 3px 14px rgba(0,0,0,.09);
  overflow:hidden; margin-bottom:22px;
  display:none; animation:fadeIn .28s ease;
}
.quiz-card.active { display:block; }

.quiz-header {
  background:linear-gradient(90deg, var(--teal), #1a6b5e);
  color:white; padding:13px 20px; font-weight:bold; font-size:1rem;
}
.quiz-body { padding:18px 22px; }
.quiz-q { font-size:1.02rem; color:var(--navy); font-weight:bold; margin-bottom:14px; }
.quiz-options { display:flex; flex-direction:column; gap:9px; }

.quiz-option {
  border:2px solid var(--gray-3); border-radius:8px; padding:11px 15px;
  cursor:pointer; font-family:inherit; font-size:13.5px;
  text-align:left; background:white; color:var(--gray-1);
  transition:border-color .15s, background .15s;
}
.quiz-option:hover:not(:disabled) { border-color:var(--teal); background:#f0f9f7; }
.quiz-option.correct { border-color:var(--teal); background:#e6f5f2; color:#0a5c4e; font-weight:bold; }
.quiz-option.wrong   { border-color:#e74c3c; background:#fdf0ef; color:#a93226; }
.quiz-option:disabled { cursor:default; }

.quiz-feedback { margin-top:13px; padding:12px 16px; border-radius:8px; font-size:13.5px; display:none; }
.quiz-feedback.show { display:block; }
.quiz-feedback.ok { background:#e6f5f2; color:#0a5c4e; border-left:4px solid var(--teal); }
.quiz-feedback.ng { background:#fdf0ef; color:#a93226; border-left:4px solid #e74c3c; }
.quiz-next-btn { margin-top:13px; display:none; }
.quiz-next-btn.show { display:block; }

/* --- チャプター完了 --- */
.chapter-complete { text-align:center; padding:40px 20px; display:none; }
.chapter-complete.active { display:block; }
.chapter-complete .big-badge { font-size:4.5rem; margin-bottom:12px; }
.chapter-complete h2 { color:var(--navy); margin-bottom:8px; }
.chapter-complete p { color:var(--gray-2); margin-bottom:20px; }

/* モバイル */
@media (max-width:720px) {
  .learn-container { grid-template-columns:1fr; }
  .sidebar { position:static; height:auto; display:flex; flex-wrap:wrap; padding:6px 0; }
  .chapter-btn { width:auto; flex:1; min-width:110px; font-size:11.5px; }
  .learn-main { padding:14px 12px 40px; }
}
  </style>
</head>

// ===== Ch.5 動詞・修飾語 =====
{
  id:'ch5', icon:'✍️', title:'学術動詞・修飾語 — 論文で使う表現',

  slides:[

      title:'なぜ論文の動詞は違うのか？', icon:'📝',
      content:`
<p>日常英語では <span class="en-term">get</span> を多用しますが、学術論文では <span class="en-term">obtain</span> や <span class="en-term">acquire</span> が使われます。その理由は：</p>
<div class="hl">
  <strong>①多義性の回避：</strong>getは意味が広すぎてニュアンスが伝わりにくい<br>
  <strong>②フォーマル性：</strong>学術誌では硬い表現の方が「すわりがいい」
</div>
<p>論文の動詞は<strong>意味のグループ</strong>で覚えると効率的です。</p>`
    },
    {
      title:'意味グループ別：重要動詞①', icon:'📊',
      content:`
<table class="term-table">
  <thead><tr><th>日本語</th><th>論文でよく使う動詞</th></tr></thead>
  <tbody>
    <tr><td>示す・表す</td><td><span class="en-term">show, present, exhibit, demonstrate, indicate, describe, report</span></td></tr>
    <tr><td>評価する</td><td><span class="en-term">assess, evaluate, examine</span></td></tr>
    <tr><td>明らかにする</td><td><span class="en-term">reveal, clarify, disclose, elucidate, unravel</span></td></tr>
    <tr><td>示唆する</td><td><span class="en-term">suggest, imply</span></td></tr>
    <tr><td>関連する</td><td><span class="en-term">associate, link, relate</span></td></tr>
    <tr><td>獲得する</td><td><span class="en-term">obtain, acquire</span>（getは口語的）</td></tr>
    <tr><td>実施する</td><td><span class="en-term">perform, conduct, carry out</span></td></tr>
  </tbody>
</table>`
    },
    {
      title:'意味グループ別：重要動詞②', icon:'🔧',
      content:`
<table class="term-table">
  <thead><tr><th>日本語</th><th>論文でよく使う動詞</th></tr></thead>
  <tbody>
    <tr><td>決める・定義する</td><td><span class="en-term">decide, determine, define</span></td></tr>
    <tr><td>修正する</td><td><span class="en-term">revise, amend, correct</span></td></tr>
    <tr><td>区別する</td><td><span class="en-term">differ, distinguish, separate</span></td></tr>
    <tr><td>注意・注目する</td><td><span class="en-term">note, observe</span>（Note that S+V. = SがVすることに注意）</td></tr>

    <tr><td>適応する・採用する</td><td><span class="en-term">adapt（適応）/ adopt（採用）</span>スペルが似ているので注意！</td></tr>

<div class="wn">⚠️ <strong>adapt vs adopt</strong>：<br>
<i>adapt</i> = 環境に適応させる（adaptive immunity: 適応免疫）<br>

    },
    {
      title:'修飾語：形容詞・副詞の違い', icon:'🎯',

// ============================================================
// 状態管理
// ============================================================
const state = {
  currentChapter: 0, currentSlide: 0,
  inQuiz: false, quizIndex: 0, quizAnswered: false,
  completedChapters: new Set(),
  totalUnits: 0, completedUnits: 0
};

function calcTotals() {
  state.totalUnits = CHAPTERS.reduce((s, ch) => s + ch.slides.length + ch.quizzes.length, 0);
}

// ============================================================
// サイドバー
// ============================================================
function buildSidebar() {
  document.getElementById('sidebarNav').innerHTML = CHAPTERS.map((ch, i) => `
    <button class="chapter-btn ${i===0?'active':''}" onclick="goChapter(${i})" id="sb-${i}">
      <span class="ch-icon">${ch.icon}</span>
      <span class="ch-label">${ch.title}</span>
      <span class="ch-check" id="sbcheck-${i}"></span>
    </button>`).join('');
}

// ============================================================
// レンダリング
// ============================================================
function render() {
  const ch = CHAPTERS[state.currentChapter];
  const total = ch.slides.length;
  const qTotal = ch.quizzes.length;
  const isDone = state.currentSlide >= total + qTotal;

  if (isDone)       { renderComplete(ch); return; }
  if (state.inQuiz) { renderQuiz(ch); }
  else              { renderSlideContent(ch); }
  updateProgress();
}

function renderSlideContent(ch) {
  const sl = ch.slides[state.currentSlide];
  const total = ch.slides.length;
  const isLast = state.currentSlide === total - 1;
  document.getElementById('slideArea').innerHTML = `
    <div class="slide-card active">
      <div class="slide-eyebrow">
        <span>${ch.icon} ${ch.title}</span>
        <span>スライド ${state.currentSlide+1} / ${total}</span>
      </div>
      <div class="slide-body">
        <h2 class="slide-title"><span class="icon">${sl.icon}</span>${sl.title}</h2>
        <div class="slide-content">${sl.content}</div>
      </div>
      <div class="slide-nav">
        <button class="btn btn-ghost btn-sm" onclick="prevSlide()" ${state.currentSlide===0?'disabled':''}>← 前へ</button>
        <span class="slide-counter">Ch.${state.currentChapter+1} — ${state.currentSlide+1}/${total}</span>
        <button class="btn ${isLast?'btn-amber':'btn-accent'} btn-sm" onclick="nextSlide()">
          ${isLast?'クイズへ ✏️':'次へ →'}
        </button>
      </div>
    </div>`;
}

function renderQuiz(ch) {
  const qi = state.quizIndex;
  const quiz = ch.quizzes[qi];
  const total = ch.quizzes.length;
  document.getElementById('slideArea').innerHTML = `
    <div class="quiz-card active">
      <div class="quiz-header">✏️ 確認クイズ ${qi+1} / ${total} — ${ch.title}</div>
      <div class="quiz-body">
        <div class="quiz-q">Q. ${quiz.q}</div>
        <div class="quiz-options">
          ${quiz.options.map((o,i)=>`
            <button class="quiz-option" id="opt-${i}" onclick="answerQuiz(${i})">
              ${String.fromCharCode(65+i)}. ${o}
            </button>`).join('')}
        </div>
        <div class="quiz-feedback" id="qfb"></div>
        <div class="quiz-next-btn" id="qnext">
          <button class="btn btn-accent" onclick="nextQuiz()">
            ${qi<total-1?'次の問題 →':'チャプター完了 🎉'}
          </button>
        </div>
      </div>
    </div>`;
}

function renderComplete(ch) {
  document.getElementById('slideArea').innerHTML = `
    <div class="chapter-complete active card">
      <div class="big-badge">${ch.icon}</div>
      <h2>「${ch.title}」完了！</h2>
      <p>バッジ <strong>${ch.badge}</strong> を獲得しました 🎉</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        ${state.currentChapter < CHAPTERS.length-1 ? `
          <button class="btn btn-accent" onclick="goChapter(${state.currentChapter+1})">次のチャプターへ →</button>` :
          `<div class="hl" style="max-width:420px;margin:0 auto;">
            <strong>🏆 全チャプター完了！</strong><br>すべてのバッジを獲得しました。
          </div>`}
        <button class="btn btn-ghost" onclick="goChapter(${state.currentChapter})">もう一度このChを学ぶ</button>
        <a href="index.html" class="btn btn-primary">ポータルへ戻る</a>
      </div>
    </div>`;
}

// ============================================================
// ナビゲーション
// ============================================================
function goChapter(idx) {
  state.currentChapter = idx;
  state.currentSlide = 0;
  state.inQuiz = false;
  state.quizIndex = 0;
  state.quizAnswered = false;
  document.querySelectorAll('.chapter-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  render();
  window.scrollTo({top:58, behavior:'smooth'});
}

function nextSlide() {
  const ch = CHAPTERS[state.currentChapter];
  state.completedUnits++;
  if (state.currentSlide < ch.slides.length-1) {
    state.currentSlide++;
  } else {
    state.inQuiz = true;
    state.quizIndex = 0;
  }
  render();
}

function prevSlide() {
  if (state.currentSlide > 0) { state.currentSlide--; render(); }
}

function answerQuiz(sel) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const quiz = CHAPTERS[state.currentChapter].quizzes[state.quizIndex];
  const ok = sel === quiz.answer;
  document.querySelectorAll('.quiz-option').forEach((b,i) => {
    b.disabled = true;
    if (i===quiz.answer) b.classList.add('correct');
    else if (i===sel && !ok) b.classList.add('wrong');
  });
  const fb = document.getElementById('qfb');
  fb.textContent = (ok ? '✅ 正解！ ' : `❌ 不正解。正解は ${String.fromCharCode(65+quiz.answer)} です。\n`) + quiz.explanation;
  fb.className = 'quiz-feedback show ' + (ok?'ok':'ng');
  document.getElementById('qnext').classList.add('show');
  state.completedUnits++;
  updateProgress();
}

function nextQuiz() {
  const ch = CHAPTERS[state.currentChapter];
  state.quizAnswered = false;
  if (state.quizIndex < ch.quizzes.length-1) {
    state.quizIndex++;
    render();
  } else {
    state.completedChapters.add(state.currentChapter);
    earnBadge(ch.id);
    document.getElementById(`sb-${state.currentChapter}`).classList.add('done');
    document.getElementById(`sbcheck-${state.currentChapter}`).textContent = '✓';
    state.inQuiz = false;
    state.currentSlide = ch.slides.length + ch.quizzes.length;
    render();
    updateProgress();
  }
}

// ============================================================
// バッジ・進捗
// ============================================================
function earnBadge(id) {
  const b = document.querySelector(`.badge[data-badge="${id}"]`);
  if (b) b.classList.add('earned');
}

function updateProgress() {
  const pct = Math.min(100, Math.round((state.completedUnits / state.totalUnits) * 100));
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = `進捗 ${state.completedUnits}/${state.totalUnits}`;
}

// ============================================================
// 初期化
// ============================================================
calcTotals();
buildSidebar();
render();
</script>
</body>
</html>
